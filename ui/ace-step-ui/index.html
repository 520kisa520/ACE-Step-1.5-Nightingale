    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              suno: {
                DEFAULT: '#09090b',
                sidebar: '#000000',
                panel: '#121214',
                card: '#18181b',
                hover: '#27272a',
                border: '#27272a',
              },
              // 夜色主题 - 深色疗愈
              healing: {
                primary: '#5C8A7A',
                'primary-light': '#7BA69A',
                'primary-dark': '#3D6A5A',
                accent: '#8FB8A8',
                'bg-dark': '#1A2F2A',
                'bg-card': '#243A35',
                'bg-hover': '#2D4A42',
                'bg-surface': '#1E3530',
                'text-primary': '#E8F0EE',
                'text-secondary': '#B8C8C4',
                'text-muted': '#789090',
                success: '#6B9B7A',
                warning: '#A8B86A',
                error: '#A86A6A',
                info: '#6A8AA8',
              },
              // 晨曦主题 - 浅色疗愈
              dawn: {
                primary: '#7A9E8E',
                'primary-light': '#A8C4B8',
                'primary-dark': '#5C7A6E',
                accent: '#C4D8CC',
                'bg-base': '#F5F7F5',
                'bg-card': '#FFFFFF',
                'bg-hover': '#E8F0EC',
                'bg-surface': '#F0F5F2',
                'text-primary': '#2A3A35',
                'text-secondary': '#5A6A65',
                'text-muted': '#8A9A95',
                success: '#7AB88A',
                warning: '#B8C87A',
                error: '#B87A7A',
                info: '#7A9AB8',
              }
            },
            fontFamily: {
              sans: ['Inter', 'Noto Sans SC', 'sans-serif'],
            },
            animation: {
              'gradient-x': 'gradient-x 15s ease infinite',
              'pulse-slow': 'pulse-slow 3s ease-in-out infinite',
              'float': 'float 6s ease-in-out infinite',
              'fade-in': 'fade-in 0.5s ease-out',
              'slide-up': 'slide-up 0.4s ease-out',
              'breathe': 'breathe 4s ease-in-out infinite',
            },
            keyframes: {
              'gradient-x': {
                '0%, 100%': {
                  'background-size': '200% 200%',
                  'background-position': 'left center'
                },
                '50%': {
                  'background-size': '200% 200%',
                  'background-position': 'right center'
                },
              },
              'pulse-slow': {
                '0%, 100%': { opacity: '1' },
                '50%': { opacity: '0.8' },
              },
              'float': {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' },
              },
              'fade-in': {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              'slide-up': {
                '0%': { transform: 'translateY(20px)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              },
              'breathe': {
                '0%, 100%': { transform: 'scale(1)' },
                '50%': { transform: 'scale(1.02)' },
              },
            },
            backdropBlur: {
              'glass': '12px',
              'glass-strong': '16px',
            },
            boxShadow: {
              'glass': '0 8px 32px rgba(0, 0, 0, 0.1)',
              'glass-strong': '0 12px 48px rgba(0, 0, 0, 0.15)',
              'healing': '0 4px 20px rgba(92, 138, 122, 0.15)',
              'healing-strong': '0 8px 32px rgba(92, 138, 122, 0.25)',
              'dawn': '0 4px 20px rgba(122, 158, 142, 0.15)',
              'dawn-strong': '0 8px 32px rgba(122, 158, 142, 0.25)',
            }
          }
        }
      }
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap');

      :root {
        --breakpoint-mobile: 768px;
      }

      body {
        font-family: 'Inter', sans-serif;
      }

      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #d4d4d8;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #a1a1aa;
      }

      /* Dark mode scrollbar */
      .dark ::-webkit-scrollbar-thumb {
        background: #3f3f46;
      }
      .dark ::-webkit-scrollbar-thumb:hover {
        background: #52525b;
      }

      /* Hide scrollbar utility */
      .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }

      .gradient-text {
        background: linear-gradient(to right, #7A9E8E, #5C7A6E, #B8CFC4);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      @keyframes music-bars {
        0% { height: 20%; opacity: 0.5; }
        50% { height: 100%; opacity: 1; }
        100% { height: 20%; opacity: 0.5; }
      }

      .music-bar-anim {
        animation: music-bars 1s ease-in-out infinite;
      }

      .mobile-only {
        display: none;
      }
      .desktop-only {
        display: block;
      }
      @media (max-width: 767px) {
        .mobile-only {
          display: block;
        }
        .desktop-only {
          display: none;
        }
        .mobile-only-flex {
          display: flex;
        }
        .mobile-only-inline {
          display: inline;
        }
        .mobile-only-inline-flex {
          display: inline-flex;
        }
      }

      @keyframes slide-in-left {
        from { transform: translateX(-100%); }
        to { transform: translateX(0); }
      }
      @keyframes slide-out-left {
        from { transform: translateX(0); }
        to { transform: translateX(-100%); }
      }
      @keyframes slide-in-right {
        from { transform: translateX(100%); }
        to { transform: translateX(0); }
      }
      @keyframes slide-out-right {
        from { transform: translateX(0); }
        to { transform: translateX(100%); }
      }
      @keyframes fade-in {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes fade-out {
        from { opacity: 1; }
        to { opacity: 0; }
      }
      .drawer-slide-in-left {
        animation: slide-in-left 0.3s ease-out forwards;
      }
      .drawer-slide-out-left {
        animation: slide-out-left 0.3s ease-in forwards;
      }
      .drawer-slide-in-right {
        animation: slide-in-right 0.3s ease-out forwards;
      }
      .drawer-slide-out-right {
        animation: slide-out-right 0.3s ease-in forwards;
      }
      .drawer-backdrop-in {
        animation: fade-in 0.3s ease-out forwards;
      }
      .drawer-backdrop-out {
        animation: fade-out 0.3s ease-in forwards;
      }

      .backdrop-blur-mobile {
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
      }
      .backdrop-blur-mobile-lg {
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
      }

      .safe-area-inset-top {
        padding-top: env(safe-area-inset-top, 0px);
      }
      .safe-area-inset-bottom {
        padding-bottom: env(safe-area-inset-bottom, 0px);
      }
      .safe-area-inset-left {
        padding-left: env(safe-area-inset-left, 0px);
      }
      .safe-area-inset-right {
        padding-right: env(safe-area-inset-right, 0px);
      }
      .safe-area-inset-x {
        padding-left: env(safe-area-inset-left, 0px);
        padding-right: env(safe-area-inset-right, 0px);
      }
      .safe-area-inset-y {
        padding-top: env(safe-area-inset-top, 0px);
        padding-bottom: env(safe-area-inset-bottom, 0px);
      }
      .safe-area-inset-all {
        padding-top: env(safe-area-inset-top, 0px);
        padding-bottom: env(safe-area-inset-bottom, 0px);
        padding-left: env(safe-area-inset-left, 0px);
        padding-right: env(safe-area-inset-right, 0px);
      }

      .touch-none {
        -webkit-tap-highlight-color: transparent;
        touch-action: none;
      }
      .touch-pan-x {
        touch-action: pan-x;
      }
      .touch-pan-y {
        touch-action: pan-y;
      }
      .touch-manipulation {
        touch-action: manipulation;
      }
      .tap-highlight-none {
        -webkit-tap-highlight-color: transparent;
      }
      .scroll-touch {
        -webkit-overflow-scrolling: touch;
      }
      .overscroll-none {
        overscroll-behavior: none;
      }
      .overscroll-contain {
        overscroll-behavior: contain;
      }
    </style>
